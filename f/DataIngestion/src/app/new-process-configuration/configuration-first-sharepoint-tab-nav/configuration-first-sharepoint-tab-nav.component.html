<button class="nav-link npc-sp-nav" [id]="sharePointSettingsTabId" type="button" role="tab"
  [attr.aria-controls]="sharePointSettingsTabPaneId" [attr.aria-selected]="isNavActive" [attr.title]="navTitle"
  (click)="onTabClick($event)" [ngClass]="{
    'd-none': !(processType == sharePointProcessTypeId),
    'active': isNavActive
  }" [disabled]="processType == ''">
  <span class="tab-icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
      <circle cx="8" cy="8" r="3.1" fill="currentColor" opacity="0.55"></circle>
      <circle cx="15.8" cy="8" r="3.1" fill="currentColor" opacity="0.7"></circle>
      <circle cx="8" cy="15.8" r="3.1" fill="currentColor" opacity="0.85"></circle>
      <circle cx="15.8" cy="15.8" r="3.1" fill="currentColor"></circle>
    </svg>
  </span>
  <span class="npc-sp-nav__label">{{ navLabel }}</span>
  <i class="material-icons-outlined npc-sp-nav__chevron" aria-hidden="true">chevron_right</i>
</button>
